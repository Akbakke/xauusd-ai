meta:
  router_version: V3_RANGE
  role: REPLAY_VERIFICATION
  description: 'TRUTH entry policy for EU/London/NY sessions with V10_CTX enabled
    for replay verification. This is a verification policy to ensure V10/V10_CTX is
    actually called in replay. All gates/thresholds/risk settings are identical to
    the SNIPER replay policy.

    '
  bundle_location: canonical_truth
policy_name: GX1_TRUTH_REPLAY_V10_CTX
version: GX1_TRUTH_REPLAY_V10_CTX
mode: REPLAY
run_mode: SHADOW
instrument: XAU_USD
timeframe: M5
warmup_bars: 288
entry_config: gx1/configs/entry_configs/ENTRY_V10_CTX_TRUTH_REPLAY.yaml
replay_config:
  policy_module: gx1.policy.entry_policy_sniper_v10_ctx
  policy_class: EntryPolicySniperV10Ctx
  policy_id: entry_policy_sniper_v10_ctx
  entry_model_id: ENTRY_V10_CTX_GATED_FUSION
  runtime_feature_impl: v10_ctx
  runtime_feature_module: gx1.features.runtime_v10_ctx
  v9_forbidden: true
  replay_pregate:
    enabled: true
    allow_sessions:
    - EU
    - OVERLAP
    - US
    max_spread_bps: 100.0
    min_atr_bps: null
    max_atr_bps: 200.0
    require_warmup_ready: true
    allow_degraded: false
exit_config: gx1/configs/policies/canonical_truth/exits/EXIT_TRANSFORMER_ONLY_V0.yaml
exit_model:
  threshold: 0.48
  exit_logit_temperature: 1.0
execution:
  dry_run: true
  max_open_trades: 10
risk_guard:
  config_path: gx1/configs/policies/canonical_truth/guards/RISK_GUARD_V1.yaml
logging:
  level: INFO
backfill:
  enabled: true
  overlap_bars: 6
  lookback_padding: 100
  target_bars_padding: 100
exit_control:
  allowed_loss_closers:
  - ML_EXIT_TRANSFORMER
  - BROKER_SL
  - SL_TICK
  - REPLAY_EOF
  require_trade_open: true
replay:
  close_open_trades_at_end: true
  eof_close_reason: REPLAY_EOF
  eof_price_source: mid
replay_regime_filter:
  enabled: true
  sessions:
  - EU
  d1_atr_percentile_252:
    enabled: true
    min: 0.8650793650793651
    max: 1.0
sniper_q4_cchop_overlay:
  enabled: true
  multipliers:
    EU: 1.0
    OVERLAP: 1.0
    US: 0.5
  default_multiplier: 1.0
require_v9_for_entry: false
entry_models:
  v9:
    enabled: false
  v10:
    enabled: true
    model_path: models/entry_v10/entry_v10_transformer.pt
  xgb:
    enabled: true
    mode: universal
    universal_model_path: /home/andre2/GX1_DATA/models/models/xgb_universal_multihead_v2__ATR_TB_FLATLESS_20260307_101838/xgb_universal_multihead_v2.joblib
  v10_ctx:
    enabled: true
    bundle_dir: /home/andre2/GX1_DATA/models/models/entry_v10_ctx/ENTRY_V10_CTX__RETRAIN_20260313_1630__CTX21_VNEXT/BASELINE
ENTRY_CONTEXT_FEATURES_ENABLED: true
